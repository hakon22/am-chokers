<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Chokers — Light Style Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.19.4/dist/reset.css">
<style>
/* ── TOKENS ── */
:root {
  --cream:     #faf7f2;
  --cream-d:   #f2ede4;
  --white:     #ffffff;
  --gold:      #c9a84c;
  --gold-d:    #a8883a;
  --gold-l:    #e8c96b;
  --gold-bg:   rgba(201,168,76,0.09);
  --gold-bdr:  rgba(201,168,76,0.28);
  --ink:       #1c1917;
  --ink-m:     #57534e;
  --ink-l:     #a8a29e;
  --bdr:       #e7e0d5;
  --bdr-l:     #f0ebe3;
  --shadow:    rgba(28,25,23,0.08);
  --shadow-g:  rgba(201,168,76,0.15);
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Oswald, 'Segoe UI', sans-serif;
  background: var(--cream);
  color: var(--ink);
  letter-spacing: .3px;
}
a { color: inherit; text-decoration: none; }

/* ── SPINNER (из spinner.scss, светлая палитра) ── */
.inner-circles-loader:not(:required) {
  position: relative; display: inline-block;
  width: 64px; height: 64px;
  background: var(--gold-bg); border-radius: 50%; overflow: hidden; text-indent: -9999px;
  -webkit-mask-image: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAAA5JREFUeNpiYGBgAAgwAAAEAAGbA+oJAAAAAElFTkSuQmCC);
}
.inner-circles-loader:not(:required):before,
.inner-circles-loader:not(:required):after {
  content: ''; position: absolute; top: 0;
  display: inline-block; width: 64px; height: 64px; border-radius: 50%;
}
.inner-circles-loader:not(:required):before {
  animation: icl 3s infinite; transform-origin: 0 50%; left: 0;
  background: var(--gold);
}
.inner-circles-loader:not(:required):after {
  animation: icl 3s .2s reverse infinite; transform-origin: 100% 50%; right: 0;
  background: rgba(201,168,76,0.35);
}
@keyframes icl {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(360deg); }
  100% { transform: rotate(0deg); }
}

/* ── LOADING SCREEN ── */
#lm-load {
  position: fixed; inset: 0; background: var(--cream);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 9999; transition: opacity .4s;
}
#lm-load-brand {
  font-family: Oswald, sans-serif; font-weight: 300; font-size: 22px;
  letter-spacing: 8px; text-transform: uppercase; color: var(--ink-m);
}

/* ── PAGE SWITCHER ── */
.lm-page { display: none; }
.lm-page.active { display: block; }

/* ── NAV ── */
.lm-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--bdr);
  box-shadow: 0 2px 16px var(--shadow);
}
.lm-nav-inner {
  max-width: 1320px; margin: 0 auto;
  display: flex; align-items: center;
  padding: 0 32px; height: 68px;
  gap: 0;
}
.lm-nav-logo {
  font-family: Oswald, sans-serif; font-weight: 500; font-size: 20px;
  letter-spacing: 5px; text-transform: uppercase; color: var(--ink);
  flex: 0 0 auto; margin-right: 48px;
}
.lm-nav-logo span { color: var(--gold); }
.lm-nav-links {
  display: flex; gap: 0; flex: 1;
}
.lm-nav-link {
  padding: 0 16px; height: 68px; display: flex; align-items: center;
  font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 400;
  color: var(--ink-m); cursor: pointer; transition: color .2s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.lm-nav-link:hover, .lm-nav-link.active { color: var(--ink); border-bottom-color: var(--gold); }
.lm-nav-actions {
  display: flex; align-items: center; gap: 8px; flex: 0 0 auto;
}
.lm-nav-icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-m); font-size: 17px; transition: background .2s, color .2s;
}
.lm-nav-icon-btn:hover { background: var(--cream-d); color: var(--ink); }
.lm-nav-badge {
  position: relative; display: inline-flex;
}
.lm-nav-badge-dot {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--white);
}

/* ── PROMO BANNER ── */
.lm-promo-bar {
  background: var(--gold); color: var(--white);
  text-align: center; padding: 9px 16px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400;
}

/* ── HERO (split layout) ── */
.lm-hero {
  max-width: 1320px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; min-height: 560px; align-items: center;
  padding: 64px 32px;
}
.lm-hero-text { padding-right: 64px; }
.lm-hero-eyebrow {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); font-weight: 400; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.lm-hero-eyebrow::before {
  content: ''; display: inline-block;
  width: 32px; height: 1px; background: var(--gold);
}
.lm-hero-h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 62px; font-weight: 500; line-height: 1.1;
  color: var(--ink); margin: 0 0 20px;
}
.lm-hero-h1 em { color: var(--gold); font-style: italic; }
.lm-hero-sub {
  font-family: Oswald, sans-serif; font-weight: 200;
  font-size: 15px; letter-spacing: 1px; color: var(--ink-m); margin-bottom: 36px;
  line-height: 1.6; max-width: 380px;
}
.lm-hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.lm-hero-visual {
  position: relative; display: flex; align-items: center; justify-content: center;
}
.lm-hero-img-wrap {
  width: 420px; height: 480px; border-radius: 24px;
  background: linear-gradient(145deg, #ede8df 0%, #d8d0c4 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  box-shadow: 0 32px 80px var(--shadow), 0 0 0 1px var(--bdr);
}
.lm-hero-img-placeholder {
  font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic;
  color: var(--ink-l); text-align: center; line-height: 1.8;
}
.lm-hero-badge-float {
  position: absolute; bottom: 28px; left: -28px;
  background: var(--white); border-radius: 14px;
  padding: 12px 18px; box-shadow: 0 8px 32px var(--shadow);
  display: flex; align-items: center; gap: 12px;
}
.lm-hero-badge-icon { font-size: 24px; }
.lm-hero-badge-text { font-size: 11px; letter-spacing: 1px; color: var(--ink-m); }
.lm-hero-badge-text strong { display: block; font-size: 13px; color: var(--ink); letter-spacing: .5px; }
.lm-hero-dot-accent {
  position: absolute; top: 40px; right: -16px;
  width: 120px; height: 120px; border-radius: 50%;
  border: 1.5px solid var(--gold-bdr);
}

/* ── TRUST STRIP ── */
.lm-trust {
  border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
  background: var(--white); padding: 28px 32px;
}
.lm-trust-inner {
  max-width: 1320px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
}
.lm-trust-item {
  display: flex; align-items: center; gap: 14px;
}
.lm-trust-icon { font-size: 26px; flex: 0 0 auto; }
.lm-trust-label { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-m); }
.lm-trust-label strong { display: block; font-size: 13px; color: var(--ink); margin-bottom: 2px; letter-spacing: .5px; }

/* ── SECTION ── */
.lm-section { padding: 72px 32px; max-width: 1320px; margin: 0 auto; }
.lm-section-hd {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 40px;
}
.lm-section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px; font-weight: 500; color: var(--ink);
  margin: 0 0 6px;
}
.lm-section-sub {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); margin: 0;
}

/* ── PRODUCT CARD ── */
.lm-prod-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
}
.lm-prod-card {
  background: var(--white); border-radius: 16px;
  border: 1px solid var(--bdr-l); overflow: hidden;
  transition: box-shadow .25s, transform .25s;
  cursor: pointer;
}
.lm-prod-card:hover {
  box-shadow: 0 16px 48px var(--shadow), 0 0 0 1.5px var(--gold-bdr);
  transform: translateY(-4px);
}
.lm-prod-img {
  height: 240px; background: var(--cream-d);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.lm-prod-img-ph {
  font-family: 'Cormorant Garamond', serif; font-size: 14px;
  font-style: italic; color: var(--ink-l); text-align: center;
}
.lm-prod-tag {
  position: absolute; top: 12px; left: 12px;
  background: var(--gold); color: var(--white);
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 4px;
}
.lm-prod-tag.new { background: var(--ink); }
.lm-prod-tag.sale { background: #c0392b; }
.lm-prod-wish {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%; background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer; opacity: 0; transition: opacity .2s;
}
.lm-prod-card:hover .lm-prod-wish { opacity: 1; }
.lm-prod-body { padding: 16px 18px 20px; }
.lm-prod-name {
  font-size: 13px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink); margin: 0 0 4px;
}
.lm-prod-mat {
  font-size: 12px; color: var(--ink-l); letter-spacing: .5px; margin-bottom: 10px;
}
.lm-prod-footer { display: flex; align-items: center; justify-content: space-between; }
.lm-prod-price { font-size: 16px; font-weight: 500; color: var(--ink); letter-spacing: .5px; }
.lm-prod-price-old { font-size: 12px; color: var(--ink-l); text-decoration: line-through; margin-right: 6px; }
.lm-prod-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-l); }
.lm-prod-stars { color: var(--gold); font-size: 11px; }

/* ── COLLECTIONS BAND ── */
.lm-collections {
  background: var(--cream-d); padding: 72px 32px;
}
.lm-coll-inner { max-width: 1320px; margin: 0 auto; }
.lm-coll-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px;
}
.lm-coll-card {
  border-radius: 16px; overflow: hidden; position: relative;
  height: 320px; cursor: pointer;
  background: linear-gradient(135deg, #e8e0d4, #d5ccc0);
  display: flex; align-items: flex-end;
  transition: box-shadow .25s;
  box-shadow: 0 4px 20px var(--shadow);
}
.lm-coll-card:hover { box-shadow: 0 12px 40px rgba(28,25,23,0.18); }
.lm-coll-card:nth-child(2) { background: linear-gradient(135deg, #c8b99a, #b5a487); }
.lm-coll-card:nth-child(3) { background: linear-gradient(135deg, #ddd5c8, #c9bfb2); }
.lm-coll-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(28,25,23,.7) 0%, transparent 55%);
}
.lm-coll-label {
  position: relative; z-index: 1; padding: 24px;
}
.lm-coll-name {
  font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500;
  color: var(--white); margin: 0 0 4px;
}
.lm-coll-count { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.7); }

/* ── BESTSELLER RIBBON ── */
.lm-ribbon-wrap {
  border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
  background: var(--gold); padding: 14px 0; overflow: hidden;
}
.lm-ribbon-track {
  display: flex; gap: 48px; white-space: nowrap;
  animation: ribbon-scroll 22s linear infinite;
}
.lm-ribbon-item {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--white); flex: 0 0 auto; display: flex; align-items: center; gap: 16px;
}
.lm-ribbon-item::before { content: '✦'; font-size: 8px; opacity: .7; }
@keyframes ribbon-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── CATALOG LAYOUT ── */
.lm-catalog-wrap {
  max-width: 1320px; margin: 0 auto; padding: 40px 32px;
  display: grid; grid-template-columns: 260px 1fr; gap: 32px; align-items: start;
}
.lm-sidebar {
  background: var(--white); border-radius: 16px; border: 1px solid var(--bdr);
  padding: 24px; position: sticky; top: 84px;
}
.lm-sidebar-title {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ink-m); margin-bottom: 16px;
}
.lm-filter-block { margin-bottom: 28px; }
.lm-filter-label {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--ink); margin-bottom: 10px; font-weight: 400;
}
.lm-filter-chip {
  display: inline-block; margin: 0 6px 6px 0;
  border: 1px solid var(--bdr); border-radius: 20px;
  padding: 5px 14px; font-size: 12px; letter-spacing: .5px;
  color: var(--ink-m); cursor: pointer; transition: all .2s;
}
.lm-filter-chip:hover, .lm-filter-chip.sel {
  background: var(--gold-bg); border-color: var(--gold); color: var(--gold-d);
}
.lm-color-row { display: flex; flex-wrap: wrap; gap: 8px; }
.lm-color-dot {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color .2s;
}
.lm-color-dot:hover, .lm-color-dot.sel { border-color: var(--gold); }
.lm-catalog-main {}
.lm-catalog-topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--bdr);
}
.lm-catalog-count { font-size: 13px; color: var(--ink-m); letter-spacing: .5px; }
.lm-catalog-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}

/* ── PRODUCT PAGE ── */
.lm-product-wrap {
  max-width: 1320px; margin: 0 auto; padding: 40px 32px;
}
.lm-product-grid {
  display: grid; grid-template-columns: 1fr 480px; gap: 64px; align-items: start;
}
.lm-product-gallery { display: flex; gap: 12px; }
.lm-product-thumbs { display: flex; flex-direction: column; gap: 10px; }
.lm-product-thumb {
  width: 76px; height: 76px; border-radius: 10px;
  background: var(--cream-d); border: 2px solid var(--bdr);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--ink-l); text-align: center;
  transition: border-color .2s;
}
.lm-product-thumb.active { border-color: var(--gold); }
.lm-product-main-img {
  flex: 1; border-radius: 16px; overflow: hidden;
  background: var(--cream-d); aspect-ratio: 3/4;
  display: flex; align-items: center; justify-content: center;
}
.lm-product-info {}
.lm-product-breadcrumb { font-size: 12px; color: var(--ink-l); margin-bottom: 16px; letter-spacing: .5px; }
.lm-product-breadcrumb span { color: var(--gold-d); }
.lm-product-name {
  font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 500;
  line-height: 1.15; color: var(--ink); margin: 0 0 8px;
}
.lm-product-sku { font-size: 11px; letter-spacing: 2px; color: var(--ink-l); margin-bottom: 18px; }
.lm-product-rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.lm-product-price-row { margin-bottom: 28px; }
.lm-product-price-new { font-size: 32px; font-weight: 500; color: var(--ink); }
.lm-product-price-old { font-size: 16px; color: var(--ink-l); text-decoration: line-through; margin-left: 12px; }
.lm-product-option-label {
  font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-m); margin-bottom: 10px;
}
.lm-product-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.lm-product-opt-btn {
  border: 1.5px solid var(--bdr); border-radius: 8px; padding: 8px 20px;
  font-size: 13px; color: var(--ink-m); cursor: pointer; background: none;
  transition: all .2s; letter-spacing: .5px;
}
.lm-product-opt-btn.active { border-color: var(--gold); color: var(--ink); background: var(--gold-bg); }
.lm-product-add-row { display: flex; gap: 12px; margin-bottom: 28px; }
.lm-product-qty {
  display: flex; align-items: center; border: 1.5px solid var(--bdr); border-radius: 10px; overflow: hidden;
}
.lm-product-qty-btn {
  width: 40px; height: 48px; border: none; background: none; cursor: pointer;
  font-size: 18px; color: var(--ink-m); transition: background .2s;
}
.lm-product-qty-btn:hover { background: var(--cream-d); }
.lm-product-qty-val { width: 44px; text-align: center; font-size: 15px; }
.lm-product-guarantee {
  background: var(--gold-bg); border: 1px solid var(--gold-bdr); border-radius: 12px;
  padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--ink-m); letter-spacing: .5px;
}
.lm-product-guarantee-icon { font-size: 22px; }
.lm-product-tabs { margin-top: 56px; }

/* ── ACCOUNT PAGE ── */
.lm-account-wrap {
  max-width: 1320px; margin: 0 auto; padding: 40px 32px;
  display: grid; grid-template-columns: 240px 1fr; gap: 32px;
}
.lm-acc-sidebar {
  background: var(--white); border-radius: 16px; border: 1px solid var(--bdr); padding: 28px;
}
.lm-acc-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-l), var(--gold-d));
  margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--white);
}
.lm-acc-name { text-align: center; font-size: 15px; font-weight: 400; letter-spacing: 1px; margin-bottom: 4px; }
.lm-acc-email { text-align: center; font-size: 12px; color: var(--ink-l); margin-bottom: 24px; letter-spacing: .5px; }
.lm-acc-divider { height: 1px; background: var(--bdr); margin-bottom: 16px; }
.lm-acc-menu-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 10px; cursor: pointer; font-size: 13px; letter-spacing: .5px;
  color: var(--ink-m); transition: all .2s; margin-bottom: 2px;
}
.lm-acc-menu-item:hover { background: var(--cream-d); color: var(--ink); }
.lm-acc-menu-item.active { background: var(--gold-bg); color: var(--gold-d); }
.lm-acc-content { display: flex; flex-direction: column; gap: 24px; }
.lm-acc-card {
  background: var(--white); border-radius: 16px; border: 1px solid var(--bdr); padding: 28px;
}
.lm-acc-card-title {
  font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink);
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--bdr);
}
.lm-order-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--bdr-l);
}
.lm-order-row:last-child { border-bottom: none; }
.lm-order-id { font-size: 12px; letter-spacing: 1.5px; color: var(--ink-m); }
.lm-order-date { font-size: 12px; color: var(--ink-l); }
.lm-order-amount { font-size: 14px; font-weight: 500; }

/* ── FOOTER ── */
.lm-footer {
  background: var(--ink); color: rgba(255,255,255,.7);
  padding: 56px 32px 32px;
}
.lm-footer-inner { max-width: 1320px; margin: 0 auto; }
.lm-footer-grid {
  display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px;
  margin-bottom: 48px;
}
.lm-footer-brand {
  font-family: Oswald, sans-serif; font-weight: 500; font-size: 18px;
  letter-spacing: 5px; text-transform: uppercase; color: var(--white); margin-bottom: 12px;
}
.lm-footer-brand span { color: var(--gold); }
.lm-footer-desc { font-size: 13px; line-height: 1.8; color: rgba(255,255,255,.5); margin-bottom: 20px; }
.lm-footer-socials { display: flex; gap: 10px; }
.lm-footer-soc {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; transition: border-color .2s;
}
.lm-footer-soc:hover { border-color: var(--gold); }
.lm-footer-col-title {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  var pageState   = React.useState('home');
  var page        = pageState[0];
  var setPage     = pageState[1];

  // Hide loading screen
  React.useEffect(function() {
    var el = document.getElementById('lm-load');
    if (el) { el.style.opacity = '0'; setTimeout(function() { el.style.display = 'none'; }, 400); }
  }, []);

  function navigate(pg) { setPage(pg); window.scrollTo({ top:0, behavior:'smooth' }); }

  var pageEl;
  if      (page === 'home')    pageEl = h(HomePage,    { setPage:navigate });
  else if (page === 'catalog') pageEl = h(CatalogPage, { setPage:navigate });
  else if (page === 'product') pageEl = h(ProductPage, { setPage:navigate });
  else if (page === 'account') pageEl = h(AccountPage, { setPage:navigate });

  return h(ConfigProvider, { theme: LM_THEME },
    h('div', { style:{ minHeight:'100vh', display:'flex', flexDirection:'column' } },
      h(AppNav, { page:page, setPage:navigate }),
      h('main', { style:{ flex:1 } }, pageEl),
      h(RibbonBanner),
      h(AppFooter),
      h(MobileNav, { page:page, setPage:navigate })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
