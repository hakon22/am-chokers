<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Chokers — v3 Teal Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.19.4/dist/reset.css">
<style>
:root {
  --teal:     #1e4d4a;
  --teal-l:   #2d6b67;
  --teal-xl:  #4a9490;
  --teal-bg:  rgba(30,77,74,0.07);
  --teal-bdr: rgba(30,77,74,0.2);
  --gold:     #c9a84c;
  --gold-bg:  rgba(201,168,76,0.1);
  --parch:    #f5f0e8;
  --parch-d:  #ede5d8;
  --parch-dd: #ddd3c3;
  --white:    #ffffff;
  --ink:      #1a1a1a;
  --ink-m:    #5a6060;
  --ink-l:    #9aacaa;
  --bdr:      #e2ddd6;
  --shadow:   rgba(30,77,74,0.12);
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin:0; font-family:Oswald,'Segoe UI',sans-serif; background:var(--parch); color:var(--ink); }
a { color:inherit; text-decoration:none; }

/* ── SPINNER ── */
.icl:not(:required) {
  position:relative; display:inline-block; width:60px; height:60px;
  background:var(--teal-bg); border-radius:50%; overflow:hidden; text-indent:-9999px;
  -webkit-mask-image:url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAAA5JREFUeNpiYGBgAAgwAAAEAAGbA+oJAAAAAElFTkSuQmCC);
}
.icl:not(:required):before,.icl:not(:required):after {
  content:''; position:absolute; top:0; display:inline-block; width:60px; height:60px; border-radius:50%;
}
.icl:not(:required):before { animation:icl 3s infinite; transform-origin:0 50%; left:0; background:var(--teal); }
.icl:not(:required):after  { animation:icl 3s .2s reverse infinite; transform-origin:100% 50%; right:0; background:rgba(30,77,74,0.35); }
@keyframes icl { 0%{transform:rotate(0)} 50%{transform:rotate(360deg)} 100%{transform:rotate(0)} }

/* ── LOADING ── */
#v3-load { position:fixed; inset:0; background:var(--parch); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:9999; transition:opacity .4s; }
#v3-load-brand { font-family:Oswald,sans-serif; font-weight:200; font-size:20px; letter-spacing:10px; text-transform:uppercase; color:var(--teal); }

/* ── NAV — centred logo ── */
.v3-nav { background:var(--white); border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:100; }
.v3-nav-inner { max-width:1360px; margin:0 auto; padding:0 32px; height:64px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; }
.v3-nav-left  { display:flex; align-items:center; gap:28px; }
.v3-nav-link  { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-m); cursor:pointer; transition:color .2s; white-space:nowrap; }
.v3-nav-link:hover,.v3-nav-link.on { color:var(--teal); }
.v3-nav-logo  { font-family:Oswald,sans-serif; font-weight:500; font-size:18px; letter-spacing:6px; text-transform:uppercase; color:var(--ink); white-space:nowrap; }
.v3-nav-logo em { color:var(--teal); font-style:normal; }
.v3-nav-right { display:flex; align-items:center; justify-content:flex-end; gap:6px; }
.v3-icon-btn  { width:38px; height:38px; border:none; background:none; cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--ink-m); transition:background .2s,color .2s; }
.v3-icon-btn:hover { background:var(--teal-bg); color:var(--teal); }

/* ── PROMO ── */
.v3-promo { background:var(--teal); color:rgba(255,255,255,.85); text-align:center; padding:8px; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; }

/* ── HERO ── */
.v3-hero { display:grid; grid-template-columns:55% 45%; min-height:580px; }
.v3-hero-text { background:var(--teal); display:flex; align-items:center; padding:80px 64px; }
.v3-hero-text-inner { max-width:500px; }
.v3-hero-tag { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.v3-hero-tag::after { content:''; flex:1; height:1px; background:rgba(201,168,76,.35); }
.v3-hero-h1 { font-family:'Playfair Display',serif; font-size:58px; font-weight:400; line-height:1.1; color:var(--white); margin:0 0 20px; }
.v3-hero-h1 em { color:var(--gold); font-style:italic; }
.v3-hero-sub { font-size:14px; font-weight:200; letter-spacing:1px; color:rgba(255,255,255,.65); line-height:1.7; margin-bottom:36px; }
.v3-hero-btns { display:flex; gap:12px; flex-wrap:wrap; }
.v3-hero-visual { background:var(--parch-dd); display:flex; align-items:stretch; position:relative; overflow:hidden; }
.v3-hero-img { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.v3-hero-img-ph { font-family:'Playfair Display',serif; font-size:16px; font-style:italic; color:var(--ink-l); text-align:center; }
.v3-hero-counter { position:absolute; bottom:28px; right:28px; background:var(--white); border-radius:12px; padding:14px 20px; box-shadow:0 8px 32px var(--shadow); }
.v3-hero-counter-num { font-size:26px; font-weight:500; color:var(--teal); line-height:1; margin-bottom:2px; }
.v3-hero-counter-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-l); }
.v3-hero-strip { position:absolute; top:0; left:0; width:6px; height:100%; background:var(--gold); }

/* ── STRIP ── */
.v3-strip { background:var(--parch-d); border-top:1px solid var(--bdr); border-bottom:1px solid var(--bdr); padding:20px 32px; }
.v3-strip-inner { max-width:1360px; margin:0 auto; display:flex; justify-content:space-around; flex-wrap:wrap; gap:16px; }
.v3-strip-item { display:flex; align-items:center; gap:12px; }
.v3-strip-icon { width:40px; height:40px; border-radius:50%; background:var(--teal-bg); display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
.v3-strip-txt strong { display:block; font-size:13px; color:var(--ink); letter-spacing:.5px; margin-bottom:2px; }
.v3-strip-txt span { font-size:11px; color:var(--ink-l); letter-spacing:.5px; }

/* ── SECTION ── */
.v3-sec { max-width:1360px; margin:0 auto; padding:72px 32px; }
.v3-sec-hd { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:40px; }
.v3-sec-eyebrow { font-size:10px; letter-spacing:3.5px; text-transform:uppercase; color:var(--teal-xl); margin-bottom:8px; }
.v3-sec-title { font-family:'Playfair Display',serif; font-size:38px; font-weight:400; color:var(--ink); margin:0; }

/* ── PRODUCT CARD ── */
.v3-grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
.v3-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.v3-card { background:var(--white); border-radius:12px; border:1px solid var(--bdr); overflow:hidden; cursor:pointer; transition:box-shadow .22s,transform .22s; }
.v3-card:hover { box-shadow:0 12px 40px var(--shadow); transform:translateY(-3px); }
.v3-card-img { height:220px; background:var(--parch-d); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.v3-card-img-ph { font-family:'Playfair Display',serif; font-size:13px; font-style:italic; color:var(--ink-l); text-align:center; }
.v3-card-badge { position:absolute; top:10px; left:10px; background:var(--teal); color:#fff; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border-radius:3px; }
.v3-card-badge.sale { background:#c0392b; }
.v3-card-badge.new  { background:var(--gold); color:var(--ink); }
.v3-card-wish { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%; background:var(--white); display:flex; align-items:center; justify-content:center; font-size:14px; opacity:0; transition:opacity .2s; }
.v3-card:hover .v3-card-wish { opacity:1; }
.v3-card-body { padding:14px 16px 18px; }
.v3-card-cat  { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--teal-xl); margin-bottom:4px; }
.v3-card-name { font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--ink); margin-bottom:4px; }
.v3-card-mat  { font-size:12px; color:var(--ink-l); margin-bottom:12px; }
.v3-card-foot { display:flex; justify-content:space-between; align-items:center; }
.v3-card-price { font-size:17px; font-weight:500; color:var(--teal); }
.v3-card-price-old { font-size:12px; color:var(--ink-l); text-decoration:line-through; margin-right:6px; }
.v3-card-stars { font-size:11px; color:var(--gold); }

/* ── EDITORIAL BLOCK (homepage) ── */
.v3-editorial { background:var(--teal); padding:72px 32px; }
.v3-editorial-inner { max-width:1360px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center; }
.v3-editorial-tag { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
.v3-editorial-h2 { font-family:'Playfair Display',serif; font-size:42px; font-weight:400; line-height:1.2; color:var(--white); margin:0 0 20px; }
.v3-editorial-h2 em { font-style:italic; color:var(--gold); }
.v3-editorial-body { font-size:14px; font-weight:200; color:rgba(255,255,255,.65); line-height:1.8; letter-spacing:.5px; margin-bottom:28px; }
.v3-editorial-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.v3-editorial-tile { border-radius:10px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); padding:20px; }
.v3-editorial-tile-num { font-size:24px; font-weight:500; color:var(--gold); margin-bottom:4px; }
.v3-editorial-tile-label { font-size:11px; letter-spacing:1.5px; color:rgba(255,255,255,.5); }

/* ── CATALOG top filter bar ── */
.v3-filter-bar { background:var(--white); border-bottom:1px solid var(--bdr); padding:14px 32px; position:sticky; top:64px; z-index:90; }
.v3-filter-inner { max-width:1360px; margin:0 auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.v3-filter-chip { border:1.5px solid var(--bdr); border-radius:20px; padding:6px 16px; font-size:12px; letter-spacing:1px; color:var(--ink-m); cursor:pointer; background:none; transition:all .18s; white-space:nowrap; }
.v3-filter-chip:hover  { border-color:var(--teal); color:var(--teal); }
.v3-filter-chip.on     { background:var(--teal); border-color:var(--teal); color:#fff; }
.v3-filter-sep { width:1px; height:20px; background:var(--bdr); flex:0 0 auto; }
.v3-filter-sort { margin-left:auto; }

/* ── CATALOG GRID ── */
.v3-cat-grid { max-width:1360px; margin:0 auto; padding:32px 32px 64px; }
.v3-cat-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.v3-cat-count { font-size:13px; color:var(--ink-m); letter-spacing:.5px; }

/* ── PRODUCT PAGE ── */
.v3-prod-wrap { max-width:1200px; margin:0 auto; padding:40px 32px 80px; }
.v3-prod-layout { display:grid; grid-template-columns:1fr 420px; gap:72px; align-items:start; }
.v3-prod-gallery { display:grid; grid-template-columns:72px 1fr; gap:12px; }
.v3-prod-thumb { width:72px; height:72px; border-radius:8px; background:var(--parch-d); border:2px solid var(--bdr); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--ink-l); text-align:center; transition:border-color .2s; }
.v3-prod-thumb.on { border-color:var(--teal); }
.v3-prod-main { border-radius:16px; overflow:hidden; background:var(--parch-d); aspect-ratio:.75; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-style:italic; color:var(--ink-l); text-align:center; font-size:16px; }
.v3-prod-info {}
.v3-prod-crumb { font-size:12px; color:var(--ink-l); margin-bottom:14px; }
.v3-prod-crumb span { color:var(--teal); cursor:pointer; }
.v3-prod-name { font-family:'Playfair Display',serif; font-size:36px; font-weight:400; line-height:1.15; color:var(--ink); margin:0 0 6px; }
.v3-prod-sku  { font-size:11px; letter-spacing:2px; color:var(--ink-l); margin-bottom:16px; }
.v3-prod-price { font-size:30px; font-weight:500; color:var(--teal); margin-bottom:4px; }
.v3-prod-price-old { font-size:15px; color:var(--ink-l); text-decoration:line-through; margin-left:10px; }
.v3-prod-opt-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-m); margin:22px 0 8px; }
.v3-prod-opts { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
.v3-prod-opt { border:1.5px solid var(--bdr); border-radius:6px; padding:7px 18px; font-size:13px; color:var(--ink-m); cursor:pointer; background:none; transition:all .18s; }
.v3-prod-opt.on { border-color:var(--teal); color:var(--teal); background:var(--teal-bg); }
.v3-prod-qty { display:flex; align-items:center; border:1.5px solid var(--bdr); border-radius:8px; overflow:hidden; }
.v3-prod-qty-btn { width:40px; height:46px; border:none; background:none; cursor:pointer; font-size:18px; color:var(--ink-m); transition:background .15s; }
.v3-prod-qty-btn:hover { background:var(--parch-d); }
.v3-prod-qty-val { width:44px; text-align:center; font-size:15px; }
.v3-prod-add-row { display:flex; gap:10px; margin-bottom:20px; }
.v3-guarantee { background:var(--teal-bg); border:1px solid var(--teal-bdr); border-radius:10px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; font-size:12px; color:var(--ink-m); }
.v3-guarantee-ico { font-size:20px; flex:0 0 auto; margin-top:1px; }

/* ── ACCOUNT ── */
.v3-acc-wrap { max-width:1200px; margin:0 auto; padding:40px 32px 80px; }
.v3-acc-header { background:var(--teal); border-radius:16px; padding:32px; display:flex; align-items:center; gap:24px; margin-bottom:28px; }
.v3-acc-avatar { width:72px; height:72px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:26px; flex:0 0 auto; color:var(--white); }
.v3-acc-info { flex:1; }
.v3-acc-name { font-size:20px; font-weight:400; letter-spacing:1px; color:var(--white); margin-bottom:4px; }
.v3-acc-email { font-size:13px; color:rgba(255,255,255,.55); letter-spacing:.5px; }
.v3-acc-body { display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start; }
.v3-acc-menu { background:var(--white); border-radius:12px; border:1px solid var(--bdr); overflow:hidden; }
.v3-acc-menu-item { display:flex; align-items:center; gap:10px; padding:14px 20px; font-size:13px; letter-spacing:.5px; color:var(--ink-m); cursor:pointer; border-bottom:1px solid var(--bdr); transition:all .18s; }
.v3-acc-menu-item:last-child { border-bottom:none; }
.v3-acc-menu-item:hover { background:var(--parch); color:var(--ink); }
.v3-acc-menu-item.on { background:var(--teal-bg); color:var(--teal); border-left:3px solid var(--teal); }
.v3-acc-content { display:flex; flex-direction:column; gap:20px; }
.v3-acc-card { background:var(--white); border-radius:12px; border:1px solid var(--bdr); padding:24px; }
.v3-acc-card-title { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--teal); margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--bdr); }
.v3-order-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--parch-d); }
.v3-order-row:last-child { border-bottom:none; }

/* ── FOOTER ── */
.v3-footer { background:var(--ink); color:rgba(255,255,255,.6); padding:56px 32px 32px; }
.v3-footer-inner { max-width:1360px; margin:0 auto; }
.v3-footer-top { display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px; margin-bottom:48px; }
.v3-footer-logo { font-family:Oswald,sans-serif; font-weight:500; font-size:18px; letter-spacing:5px; color:#fff; margin-bottom:12px; }
.v3-footer-logo em { color:var(--teal-xl); font-style:normal; }
.v3-footer-desc { font-size:13px; line-height:1.8; color:rgba(255,255,255,.45); margin-bottom:20px; }
.v3-footer-socs { display:flex; gap:8px; }
.v3-footer-soc { width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; transition:border-color .2s,background .2s; }
.v3-footer-soc:hover { border-color:var(--teal-xl); background:var(--teal-bg); }
.v3-footer-col h4 { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--teal-xl); margin:0 0 14px; }
.v3-footer-link { display:block; font-size:13px; color:rgba(255,255,255,.5); margin-bottom:9px; cursor:pointer; transition:color .2s; }
.v3-footer-link:hover { color:#fff; }
.v3-footer-bottom { border-top:1px solid rgba(255,255,255,.08); padding-top:24px; display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,.3); }

/* ── MOBILE NAV ── */
.v3-mn { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--white); border-top:1px solid var(--bdr); padding:6px 0 14px; z-index:200; }
.v3-mn-row { display:flex; justify-content:space-around; }
.v3-mn-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 14px; font-size:10px; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-l); cursor:pointer; }
.v3-mn-item.on { color:var(--teal); }
.v3-mn-ico { font-size:20px; }

/* ── RESPONSIVE ── */
@media (max-width:1100px) {
  .v3-grid-4 { grid-template-columns:repeat(3,1fr); }
  .v3-hero { grid-template-columns:1fr; }
  .v3-hero-text { padding:56px 32px; }
  .v3-hero-h1 { font-size:44px; }
  .v3-hero-visual { height:320px; }
  .v3-editorial-inner { grid-template-columns:1fr; gap:32px; }
}
@media (max-width:768px) {
  body { padding-bottom:72px; }
  .v3-nav-left,.v3-nav-right { display:none; }
  .v3-nav-inner { grid-template-columns:1fr; justify-items:center; }
  .v3-mn { display:block; }
  .v3-grid-4,.v3-grid-3 { grid-template-columns:repeat(2,1fr); }
  .v3-sec { padding:40px 16px; }
  .v3-prod-layout { grid-template-columns:1fr; gap:32px; }
  .v3-prod-gallery { grid-template-columns:1fr; }
  .v3-prod-thumbs-row { display:flex; flex-direction:row; gap:8px; }
  .v3-prod-thumb { width:56px; height:56px; }
  .v3-acc-body { grid-template-columns:1fr; }
  .v3-acc-header { flex-direction:column; text-align:center; }
  .v3-footer-top { grid-template-columns:1fr 1fr; gap:28px; }
  .v3-hero-text { padding:40px 20px; }
  .v3-filter-bar { padding:10px 16px; top:64px; overflow-x:auto; }
  .v3-filter-inner { flex-wrap:nowrap; }
  .v3-cat-grid { padding:20px 16px 64px; }
  .v3-prod-wrap { padding:24px 16px 64px; }
  .v3-acc-wrap { padding:24px 16px 64px; }
}
@media (max-width:480px) {
  .v3-grid-4,.v3-grid-3 { grid-template-columns:1fr; }
  .v3-footer-top { grid-template-columns:1fr; }
  .v3-hero-h1 { font-size:34px; }
  .v3-editorial-h2 { font-size:30px; }
}
</style>
</head>
<body>

<div id="v3-load">
  <span class="icl">Loading...</span>
  <div id="v3-load-brand">AM · CHOKERS</div>
</div>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5.19.4/dist/antd.min.js" crossorigin="anonymous"></script>

<script>
var h = React.createElement;
var Button      = antd.Button;
var Card        = antd.Card;
var Row         = antd.Row;
var Col         = antd.Col;
var Typography  = antd.Typography;
var Rate        = antd.Rate;
var Tag         = antd.Tag;
var Breadcrumb  = antd.Breadcrumb;
var Form        = antd.Form;

// → src/pages/catalog/index.tsx
function CatalogPage(props) {
  var go = props.go;
  var catS   = React.useState('Все');   var cat    = catS[0];   var setCat    = catS[1];
  var priceS = React.useState([0,8000]);var price  = priceS[0]; var setPrice  = priceS[1];
  var sortS  = React.useState('pop');   var sort   = sortS[0];  var setSort   = sortS[1];
  var drwS   = React.useState(false);   var drwOpen= drwS[0];   var setDrw    = drwS[1];

  var CATS = ['Все','Чокеры','Колье','Браслеты','Серьги','Кольца'];

  var filtered = PRODS
    .filter(function(p){ return cat==='Все' || p.cat===cat; })
    .filter(function(p){ return p.price>=price[0] && p.price<=price[1]; })
    .sort(function(a,b){
      if(sort==='price_asc')  return a.price-b.price;
      if(sort==='price_desc') return b.price-a.price;
      if(sort==='new')        return (b.new?1:0)-(a.new?1:0);
      return b.rev-a.rev;
    });

  var filterDrawer = h(Drawer, {
    title:'Дополнительные фильтры', placement:'bottom', height:'auto', open:drwOpen,
    onClose: function(){ setDrw(false); }
  },
    h('div', { style:{ padding:'0 0 24px' } },
      h('div', { style:{ marginBottom:24 } },
        h('div', { style:{ fontSize:'11px', letterSpacing:'2px', textTransform:'uppercase', color:'var(--ink-m)', marginBottom:10 } }, 'Цена, ₽'),
        h(Slider, {
          range:true, min:0, max:8000, step:200, value:price, onChange:setPrice,
          tooltip:{ formatter: function(v){ return v!=null ? fmt(v) : ''; } }
        }),
        h('div', { style:{ display:'flex', justifyContent:'space-between', fontSize:'12px', color:'var(--ink-l)' } },
          h('span', null, fmt(price[0])), h('span', null, fmt(price[1]))
        )
      ),
      h('div', { style:{ marginBottom:24 } },
        h('div', { style:{ fontSize:'11px', letterSpacing:'2px', textTransform:'uppercase', color:'var(--ink-m)', marginBottom:10 } }, 'Материал'),
        h(Checkbox.Group, {
          style:{ display:'flex', flexDirection:'column', gap:10 },
          options:['Серебро 925','Позолота 18К','Нерж. сталь'].map(function(m){
            return { label:h('span',{style:{fontSize:'13px',fontFamily:'Oswald,sans-serif'}},m), value:m };
          })
        })
      ),
      h('div', { style:{ display:'flex', gap:10 } },
        h(Button, { type:'primary', style:{ letterSpacing:'1.5px', fontFamily:'Oswald,sans-serif', fontSize:'12px' }, onClick:function(){ setDrw(false); } }, 'ПРИМЕНИТЬ'),
        h(Button, { style:{ letterSpacing:'1.5px', fontFamily:'Oswald,sans-serif', fontSize:'12px' }, onClick:function(){ setPrice([0,8000]); } }, 'СБРОСИТЬ')
      )
    )
  );

  return h('div', null,
    // Top filter bar
    h('div', { className:'v3-filter-bar' },
      h('div', { className:'v3-filter-inner' },
        CATS.map(function(c) {
          return h('button', {
            key:c, className:'v3-filter-chip' + (c===cat?' on':''),
            onClick: function(){ setCat(c); }
          }, c);
        }),
        h('div', { className:'v3-filter-sep' }),
        h('button', {
          className:'v3-filter-chip',
          onClick: function(){ setDrw(true); }
        }, '⚙ Ещё фильтры'),
        h('div', { className:'v3-filter-sort' },
          h(Select, {
            value:sort, onChange:setSort, size:'small',
            style:{ width:185, fontFamily:'Oswald,sans-serif' },
            options:[
              { value:'pop',        label:'По популярности' },
              { value:'price_asc',  label:'Сначала дешевле' },
              { value:'price_desc', label:'Сначала дороже'  },
              { value:'new',        label:'Новинки первыми'  },
            ]
          })
        )
      )
    ),

    filterDrawer,

    h('div', { className:'v3-cat-grid' },
      h('div', { className:'v3-cat-topbar' },
        h('div', { className:'v3-cat-count' },
          filtered.length + ' украшений' + (cat!=='Все' ? ' · '+cat : '')
        ),
        cat !== 'Все' && h(Tag, {
          closable:true, color:'#1e4d4a',
          style:{ fontFamily:'Oswald,sans-serif', fontSize:'11px', letterSpacing:'.5px' },
          onClose: function(){ setCat('Все'); }
        }, cat)
      ),

      filtered.length===0
        ? h('div', { style:{ textAlign:'center', padding:'80px 0', color:'var(--ink-l)' } },
            h('div', { style:{ fontSize:40, marginBottom:12 } }, '🔍'),
            h('div', { style:{ fontSize:14, letterSpacing:1 } }, 'Ничего не найдено')
          )
        : h('div', { className:'v3-grid-3' },
            filtered.map(function(p){
              return h(ProdCard, { key:p.id, p:p, go:function(){ go('product'); } });
            })
          ),

      h('div', { style:{ display:'flex', justifyContent:'center', marginTop:40 } },
        h(Pagination, { current:1, total:filtered.length, pageSize:9, showSizeChanger:false })
      )
    )
  );
}

  var items=[
    {k:'home',    ico:'🏠',l:'Главная' },
    {k:'catalog', ico:'🪬',l:'Каталог' },
    {k:'',        ico:'🛒',l:'Корзина' },

    {k:'account', ico:'👤',l:'Кабинет' },
  ];
  return h('nav', { className:'v3-mn' },
    h('div', { className:'v3-mn-row' },
      items.map(function(item,i){
        return h('div', {
          key:i,
          className:'v3-mn-item'+(page===item.k?' on':''),
          onClick: item.k ? function(){ go(item.k); } : undefined
        },
          h('span',{className:'v3-mn-ico'},item.ico),
          item.l
        );
      })
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  var pgS  = React.useState('home'); var page=pgS[0]; var setPage=pgS[1];

  function go(k) { setPage(k); window.scrollTo({top:0,behavior:'smooth'}); }

  React.useEffect(function(){
    var el=document.getElementById('v3-load');
    if(el){ el.style.opacity='0'; setTimeout(function(){ el.style.display='none'; },400); }
  },[]);

  var content;
  if      (page==='home')    content = h(HomePage,    {go:go});
  else if (page==='catalog') content = h(CatalogPage, {go:go});
  else if (page==='product') content = h(ProductPage, {go:go});
  else if (page==='account') content = h(AccountPage, {go:go});

  return h(ConfigProvider, {theme:V3_THEME},
    h('div', {style:{minHeight:'100vh',display:'flex',flexDirection:'column'}},
      h(AppNav, {page:page,go:go}),
      h('main', {style:{flex:1}}, content),
      h(AppFooter),
      h(MobileNav, {page:page,go:go})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
